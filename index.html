<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Prompt-Vault">
  <meta name="application-name" content="Prompt-Vault">
  <meta name="theme-color" content="#0a0a0f">
  <meta name="description" content="Browse and explore your AI prompt collection.">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>Prompt-Vault</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;1,300&family=Instrument+Serif:ital@0;1&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0a0a0f;
      --surface: #1c1c26;
      --surface2: #24242f;
      --border: rgba(255, 255, 255, 0.11);
      --border2: rgba(255, 255, 255, 0.22);
      --text: #f0ede8;
      --muted: #8a8a9a;
      --accent: #c8f53b;
      --danger: #ff4757;
      --card-radius: 16px;
      --modal-radius: 22px;
      --safe-b: env(safe-area-inset-bottom, 0px);
      --safe-t: env(safe-area-inset-top, 0px);
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Syne', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
      opacity: 0.4;
    }

    /* â”€â”€ HEADER â”€â”€ */
    header {
      position: sticky;
      top: 0;
      z-index: 200;
      background: rgba(10, 10, 15, 0.92);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 0 40px;
      padding-top: var(--safe-t);
      height: calc(68px + var(--safe-t));
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      background: var(--accent);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .logo-sub {
      color: var(--muted);
      font-weight: 400;
      font-size: 14px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .count-badge {
      background: var(--surface2);
      border: 1px solid var(--border2);
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      padding: 4px 12px;
      border-radius: 100px;
      white-space: nowrap;
    }

    .count-badge span {
      color: var(--accent);
    }

    .btn-add {
      background: var(--accent);
      color: #0a0a0f;
      border: none;
      padding: 10px 20px;
      border-radius: 100px;
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.2s;
      letter-spacing: 0.3px;
      white-space: nowrap;
      min-height: 44px;
    }

    .btn-add:hover {
      background: #d8ff4b;
      transform: translateY(-1px);
      box-shadow: 0 8px 30px rgba(200, 245, 59, 0.3);
    }

    .btn-add:active {
      transform: scale(0.97);
    }

    .btn-icon-hdr {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      border: 1px solid var(--border2);
      background: var(--surface2);
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .btn-icon-hdr:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .btn-icon-hdr:active {
      transform: scale(0.92);
    }

    /* â”€â”€ SEARCH + FILTER ROW â”€â”€ */
    .search-wrap {
      padding: 12px 40px 0;
      max-width: 1600px;
      margin: 0 auto;
    }

    .search-filter-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .search-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 12px;
      padding: 0 16px;
      transition: border-color 0.2s;
      width: 260px;
      flex-shrink: 0;
    }

    .search-bar:focus-within {
      border-color: var(--accent);
    }

    .search-bar svg {
      color: var(--muted);
      flex-shrink: 0;
    }

    .search-input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      padding: 13px 0;
      line-height: 1;
      -webkit-appearance: none;
      appearance: none;
    }

    .search-input::placeholder {
      color: var(--muted);
    }

    .search-clear {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      padding: 4px;
      display: none;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      transition: color 0.2s;
    }

    .search-clear.visible {
      display: flex;
    }

    .search-clear:hover {
      color: var(--text);
    }

    .btn-filter {
      width: 46px;
      height: 46px;
      border-radius: 12px;
      flex-shrink: 0;
      border: 1px solid var(--border2);
      background: var(--surface2);
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      position: relative;
    }

    .btn-filter:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .btn-filter:active {
      transform: scale(0.92);
    }

    .btn-filter.active {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(200, 245, 59, 0.08);
    }

    .btn-filter .filter-dot {
      position: absolute;
      top: 7px;
      right: 7px;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      display: none;
    }

    .btn-filter.has-active-filters .filter-dot {
      display: block;
    }

    /* â”€â”€ FILTER BOTTOM SHEET â”€â”€ */
    .filter-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.55);
      z-index: 400;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.28s ease;
    }

    .filter-backdrop.open {
      opacity: 1;
      pointer-events: all;
    }

    .filter-panel {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 401;
      background: var(--surface);
      border-top: 1px solid var(--border2);
      border-radius: 24px 24px 0 0;
      padding: 0 24px calc(24px + var(--safe-b));
      max-height: 85dvh;
      overflow-y: auto;
      transform: translateY(100%);
      transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
      will-change: transform;
    }

    .filter-panel.open {
      transform: translateY(0);
    }

    .filter-sheet-handle {
      width: 36px;
      height: 4px;
      border-radius: 2px;
      background: var(--border2);
      margin: 14px auto 20px;
    }

    .filter-sheet-title {
      font-size: 16px;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 20px;
      letter-spacing: -0.3px;
    }

    .filter-panel-row {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      align-items: flex-start;
    }

    .filter-panel-group {
      flex: 1;
      min-width: 160px;
      margin-bottom: 16px;
    }

    .filter-panel-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .filter-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }

    .filter-chip {
      padding: 6px 14px;
      border-radius: 999px;
      border: 1px solid var(--border2);
      background: var(--surface2);
      color: rgba(240, 237, 232, 0.6);
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.18s;
      user-select: none;
    }

    .filter-chip:active {
      transform: scale(0.95);
    }

    .filter-chip.selected {
      font-weight: 600;
    }

    .filter-chip.fc-chatgpt.selected {
      background: rgba(16, 163, 127, 0.15);
      border-color: rgba(16, 163, 127, 0.5);
      color: #10a37f;
    }

    .filter-chip.fc-gemini.selected {
      background: rgba(66, 133, 244, 0.15);
      border-color: rgba(66, 133, 244, 0.5);
      color: #4285f4;
    }

    .filter-chip.fc-grok.selected {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.3);
      color: #d0d0d0;
    }

    .filter-chip.fc-midjourney.selected {
      background: rgba(255, 138, 76, 0.15);
      border-color: rgba(255, 138, 76, 0.5);
      color: #ff8a4c;
    }

    .filter-chip.fc-flux.selected {
      background: rgba(168, 85, 247, 0.15);
      border-color: rgba(168, 85, 247, 0.5);
      color: #a855f7;
    }

    .filter-chip.fc-vehicles.selected {
      background: rgba(251, 191, 36, 0.14);
      border-color: rgba(251, 191, 36, 0.5);
      color: #f59e0b;
    }

    .filter-chip.fc-animals.selected {
      background: rgba(52, 211, 153, 0.14);
      border-color: rgba(52, 211, 153, 0.5);
      color: #34d399;
    }

    .filter-chip.fc-humans.selected {
      background: rgba(251, 113, 133, 0.14);
      border-color: rgba(251, 113, 133, 0.5);
      color: #fb7185;
    }

    .filter-chip.fc-advertisement.selected {
      background: rgba(96, 165, 250, 0.14);
      border-color: rgba(96, 165, 250, 0.5);
      color: #60a5fa;
    }

    .filter-chip.fc-products.selected {
      background: rgba(251, 146, 60, 0.14);
      border-color: rgba(251, 146, 60, 0.5);
      color: #fb923c;
    }

    .filter-chip.fc-others.selected {
      background: rgba(148, 163, 184, 0.14);
      border-color: rgba(148, 163, 184, 0.5);
      color: #94a3b8;
    }

    .filter-sheet-footer {
      display: flex;
      gap: 10px;
      padding: 16px 0 4px;
      border-top: 1px solid var(--border);
      margin-top: 8px;
    }

    .btn-clear-filters {
      flex: 1;
      background: none;
      border: 1px solid var(--border2);
      color: var(--muted);
      padding: 12px;
      border-radius: 12px;
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-clear-filters:hover {
      border-color: var(--danger);
      color: var(--danger);
    }

    .btn-apply-filters {
      flex: 2;
      background: var(--accent);
      color: #0a0a0f;
      border: none;
      padding: 12px;
      border-radius: 12px;
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-apply-filters:active {
      transform: scale(0.97);
    }


    /* â”€â”€ FORM INPUT â”€â”€ */
    .form-input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 12px;
      padding: 13px 16px;
      color: var(--text);
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 600;
      transition: border-color 0.2s;
      outline: none;
      -webkit-appearance: none;
      appearance: none;
    }

    .form-input:focus {
      border-color: var(--accent);
    }

    .form-input::placeholder {
      color: var(--muted);
      font-weight: 400;
    }

    .view-modal-title {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -0.4px;
      color: var(--text);
      margin-bottom: 4px;
    }

    /* â”€â”€ MAIN â”€â”€ */
    main {
      padding: 40px 40px 100px;
      max-width: 1600px;
      margin: 0 auto;
    }

    /* â”€â”€ HERO â”€â”€ */
    .hero {
      margin-bottom: 48px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
    }

    .hero-text h1 {
      font-size: clamp(30px, 5vw, 64px);
      font-weight: 800;
      letter-spacing: -2px;
      line-height: 1;
      background: linear-gradient(135deg, var(--text) 40%, var(--muted));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .hero-text h1 em {
      font-family: 'Instrument Serif', serif;
      font-style: italic;
      -webkit-text-fill-color: var(--accent);
      background: none;
    }

    .hero-text p {
      margin-top: 12px;
      color: var(--muted);
      font-size: 14px;
      font-family: 'DM Mono', monospace;
      letter-spacing: 0.5px;
    }

    .filter-bar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .filter-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 8px 16px;
      border-radius: 100px;
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      min-height: 40px;
    }

    .filter-btn.active,
    .filter-btn:hover {
      background: var(--surface);
      border-color: var(--border2);
      color: var(--text);
    }

    /* â”€â”€ SAVE NOTICE â”€â”€ */
    .save-notice {
      background: rgba(200, 245, 59, 0.07);
      border: 1px solid rgba(200, 245, 59, 0.2);
      border-radius: 12px;
      padding: 14px 18px;
      margin-bottom: 28px;
      display: none;
      align-items: flex-start;
      gap: 12px;
      font-size: 13px;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      line-height: 1.6;
    }

    .save-notice.show {
      display: flex;
    }

    .save-notice svg {
      flex-shrink: 0;
      color: var(--accent);
      margin-top: 1px;
    }

    .save-notice strong {
      color: var(--accent);
    }

    .btn-export {
      margin-top: 10px;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: var(--accent);
      color: #0a0a0f;
      border: none;
      padding: 9px 16px;
      border-radius: 8px;
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-export:hover {
      background: #d8ff4b;
    }

    .btn-export:active {
      transform: scale(0.96);
    }

    /* â”€â”€ EMPTY STATE â”€â”€ */
    .empty-state {
      text-align: center;
      padding: 100px 40px;
      color: var(--muted);
    }

    .empty-icon {
      margin: 0 auto 24px;
      width: 72px;
      height: 72px;
      opacity: 0.25;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-10px);
      }
    }

    .empty-state h2 {
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      opacity: 0.5;
      margin-bottom: 8px;
    }

    .empty-state p {
      font-size: 13px;
      font-family: 'DM Mono', monospace;
    }

    /* â”€â”€ FOLDERS GRID â”€â”€ */
    .folders-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }

    /* â”€â”€ FOLDER CARD â”€â”€ */
    .folder-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--card-radius);
      overflow: hidden;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      position: relative;
      animation: cardIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    @keyframes cardIn {
      from {
        opacity: 0;
        transform: translateY(30px) scale(0.95);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .folder-card:hover {
      border-color: var(--border2);
      transform: translateY(-4px);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
    }

    .folder-card:active {
      transform: scale(0.98);
    }

    .folder-cover {
      width: 100%;
      aspect-ratio: 3/2;
      overflow: hidden;
      position: relative;
      background: linear-gradient(135deg, var(--surface2), #1a1a2e);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .folder-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .folder-cover-placeholder {
      opacity: 0.4;
    }

    .folder-cover-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, transparent 50%, rgba(10, 10, 15, 0.7) 100%);
    }

    .folder-cover-edit {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 3;
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: rgba(255, 255, 255, 0.7);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      opacity: 0;
    }

    .folder-card:hover .folder-cover-edit {
      opacity: 1;
    }

    @media (hover: none) {
      .folder-cover-edit {
        opacity: 1;
      }
    }

    .folder-cover-edit:hover {
      background: rgba(200, 245, 59, 0.2);
      border-color: var(--accent);
      color: var(--accent);
    }

    .folder-body {
      padding: 16px 18px;
    }

    .folder-name {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.3px;
      color: var(--text);
      margin-bottom: 6px;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 1;
      line-clamp: 1;
      -webkit-box-orient: vertical;
    }

    .folder-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .folder-count {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted);
    }

    .folder-actions {
      display: flex;
      gap: 6px;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .folder-card:hover .folder-actions {
      opacity: 1;
    }

    @media (hover: none) {
      .folder-actions {
        opacity: 1;
      }
    }

    /* â”€â”€ NEW FOLDER CARD â”€â”€ */
    .folder-new-card {
      background: transparent;
      border: 2px dashed var(--border2);
      border-radius: var(--card-radius);
      height: 220px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      cursor: pointer;
      transition: all 0.2s;
      color: var(--muted);
      animation: cardIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    .folder-new-card:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(200, 245, 59, 0.03);
    }

    .folder-new-card:active {
      transform: scale(0.98);
    }

    .folder-new-label {
      font-size: 14px;
      font-weight: 700;
    }

    /* â”€â”€ FOLDER VIEW (inside folder) â”€â”€ */
    .folder-view-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }

    .btn-back {
      width: 42px;
      height: 42px;
      border-radius: 10px;
      border: 1px solid var(--border2);
      background: var(--surface2);
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .btn-back:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .btn-back:active {
      transform: scale(0.9);
    }

    .folder-view-title {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -0.8px;
    }

    .folder-view-count {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
    }

    /* â”€â”€ GRID â”€â”€ */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 20px;
    }

    /* â”€â”€ CARD â”€â”€ */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--card-radius);
      overflow: hidden;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      position: relative;
      animation: cardIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
      -webkit-user-select: none;
      user-select: none;
    }

    .card:hover {
      border-color: var(--border2);
      transform: translateY(-4px);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
    }

    .card:active {
      transform: scale(0.98);
    }

    .card-slideshow {
      position: relative;
      width: 100%;
      background: var(--surface2);
      overflow: hidden;
      aspect-ratio: 4/3;
    }

    .slide {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      transform: translateX(100%);
      transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
      will-change: transform;
    }

    .slide.active {
      transform: translateX(0);
    }

    .slide.exit {
      transform: translateX(-100%);
      transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .slide img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
      background: var(--surface2);
    }

    .slide-empty {
      width: 100%;
      height: 160px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--surface2), #1a1a2e);
    }

    .slide-empty svg {
      opacity: 0.2;
    }

    .slide-dots {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 5px;
      z-index: 2;
    }

    .dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.3);
      transition: all 0.3s;
    }

    .dot.active {
      background: var(--accent);
      width: 14px;
      border-radius: 3px;
    }

    .card-img-count {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 2;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 100px;
      padding: 3px 10px;
      font-size: 11px;
      font-family: 'DM Mono', monospace;
      color: rgba(255, 255, 255, 0.7);
      display: flex;
      align-items: center;
      gap: 5px;
    }

    /* CARD BODY */
    .card-body {
      padding: 18px;
    }

    .card-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .card-index {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--accent);
      letter-spacing: 1px;
      opacity: 0.8;
    }

    .card-date {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--muted);
    }

    .card-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 6px;
      letter-spacing: -0.2px;
      line-height: 1.3;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 1;
      line-clamp: 1;
      -webkit-box-orient: vertical;
    }

    .card-prompt {
      font-size: 12px;
      line-height: 1.6;
      color: rgba(240, 237, 232, 0.78);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      font-family: 'DM Mono', monospace;
      font-weight: 300;
      margin-bottom: 10px;
    }

    /* â”€â”€ SEPARATED CARD TAGS â”€â”€ */
    .card-tags-ai {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-bottom: 5px;
    }

    .card-tags-cat {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-bottom: 12px;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .card-stats {
      display: flex;
      gap: 12px;
    }

    .stat {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
    }

    .card-actions {
      display: flex;
      gap: 6px;
    }

    .btn-icon {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      border: 1px solid var(--border2);
      background: var(--surface2);
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .btn-icon:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .btn-icon:active {
      transform: scale(0.9);
    }

    .btn-icon.danger:hover {
      border-color: var(--danger);
      color: var(--danger);
    }

    /* â”€â”€ OVERLAY â”€â”€ */
    .overlay {
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      overscroll-behavior: none;
    }

    .overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    /* â”€â”€ MODAL â”€â”€ */
    .modal {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: var(--modal-radius);
      width: 100%;
      max-width: 640px;
      max-height: 90dvh;
      overflow-y: auto;
      overflow-x: hidden;
      transform: translateY(30px) scale(0.97);
      transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
      scrollbar-width: thin;
      scrollbar-color: var(--border2) transparent;
      -webkit-overflow-scrolling: touch;
    }

    .overlay.open .modal {
      transform: translateY(0) scale(1);
    }

    .modal-header {
      padding: 22px 24px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      background: var(--surface);
      z-index: 2;
      border-bottom: 1px solid var(--border);
    }

    .modal-title {
      font-size: 19px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    .btn-close {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1px solid var(--border2);
      background: var(--surface2);
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .btn-close:hover {
      border-color: var(--danger);
      color: var(--danger);
      transform: rotate(90deg);
    }

    .btn-close:active {
      transform: rotate(90deg) scale(0.9);
    }

    .modal-body {
      padding: 22px 24px;
    }

    .form-section {
      margin-bottom: 26px;
    }

    .form-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.5px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .label-badge {
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 9px;
      color: var(--muted);
      font-weight: 400;
      letter-spacing: 0.5px;
    }

    /* â”€â”€ UPLOAD ZONE â”€â”€ */
    .upload-zone {
      border: 2px dashed var(--border2);
      border-radius: 14px;
      padding: 20px 16px 16px;
      text-align: center;
      transition: all 0.25s;
      cursor: pointer;
    }

    .upload-zone:hover {
      border-color: var(--accent);
      background: rgba(200, 245, 59, 0.04);
    }

    .upload-zone.dragover {
      border-color: var(--accent);
      background: rgba(200, 245, 59, 0.04);
    }

    .upload-icon {
      display: flex;
      justify-content: center;
      margin-bottom: 10px;
    }

    .upload-text {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .upload-text strong {
      color: var(--accent);
    }

    .upload-drag-hint {
      display: inline;
    }

    .upload-subtext {
      font-size: 11px;
      color: var(--muted);
      opacity: 0.6;
      margin-top: 4px;
      font-family: 'DM Mono', monospace;
    }

    .upload-mobile-row {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    .upload-btn {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border2);
      color: var(--text);
      padding: 11px 12px;
      border-radius: 10px;
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      transition: all 0.2s;
      min-height: 48px;
    }

    .upload-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .upload-btn:active {
      transform: scale(0.96);
    }

    @media (hover: hover) {
      .upload-camera-btn {
        display: none;
      }
    }

    @media (hover: none) {
      .upload-drag-hint {
        display: none;
      }
    }

    .upload-file-input {
      display: none;
    }

    .image-previews {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .img-thumb {
      position: relative;
      width: 76px;
      height: 76px;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid var(--border2);
      animation: thumbIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      flex-shrink: 0;
    }

    @keyframes thumbIn {
      from {
        opacity: 0;
        transform: scale(0.7);
      }

      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .img-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .remove-img {
      position: absolute;
      top: 3px;
      right: 3px;
      width: 22px;
      height: 22px;
      background: rgba(0, 0, 0, 0.75);
      border: none;
      border-radius: 50%;
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .img-thumb:hover .remove-img {
      opacity: 1;
    }

    @media (hover: none) {
      .remove-img {
        opacity: 1;
      }
    }

    /* â”€â”€ FOLDER COVER UPLOAD â”€â”€ */
    .folder-cover-upload {
      border: 2px dashed var(--border2);
      border-radius: 14px;
      width: 100%;
      height: 140px;
      overflow: hidden;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.25s;
      background: var(--surface2);
    }

    .folder-cover-upload:hover {
      border-color: var(--accent);
      background: rgba(200, 245, 59, 0.04);
    }

    .folder-cover-upload img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      position: absolute;
      inset: 0;
    }

    .folder-cover-upload-label {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
      z-index: 1;
      pointer-events: none;
      transition: color 0.2s;
    }

    .folder-cover-upload:hover .folder-cover-upload-label {
      color: var(--accent);
    }

    .folder-cover-upload-label.hidden {
      display: none;
    }

    .folder-cover-clear {
      position: absolute;
      top: 8px;
      right: 8px;
      z-index: 2;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: white;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .folder-cover-upload.has-image .folder-cover-clear {
      display: flex;
    }

    .folder-cover-upload.has-image .folder-cover-upload-label {
      display: none;
    }

    /* â”€â”€ TEXTAREA â”€â”€ */
    .form-textarea {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 12px;
      padding: 14px 16px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      line-height: 1.7;
      resize: vertical;
      min-height: 120px;
      transition: border-color 0.2s;
      outline: none;
      -webkit-appearance: none;
      appearance: none;
    }

    .form-textarea:focus {
      border-color: var(--accent);
    }

    .form-textarea::placeholder {
      color: var(--muted);
    }

    .char-count {
      text-align: right;
      font-size: 10px;
      color: var(--muted);
      margin-top: 6px;
      font-family: 'DM Mono', monospace;
    }

    .modal-footer {
      padding: 0 24px calc(24px + var(--safe-b));
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }

    .btn-cancel {
      background: var(--surface2);
      border: 1px solid var(--border2);
      color: var(--muted);
      padding: 12px 20px;
      border-radius: 10px;
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      min-height: 48px;
    }

    .btn-cancel:hover {
      color: var(--text);
    }

    .btn-cancel:active {
      transform: scale(0.97);
    }

    .btn-save {
      background: var(--accent);
      color: #0a0a0f;
      border: none;
      padding: 12px 24px;
      border-radius: 10px;
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 48px;
    }

    .btn-save:hover {
      background: #d8ff4b;
      box-shadow: 0 4px 20px rgba(200, 245, 59, 0.35);
    }

    .btn-save:active {
      transform: scale(0.97);
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 0 24px 22px;
    }

    /* â”€â”€ TAG CHIPS â”€â”€ */
    .tag-group-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .tag-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 6px;
    }

    .tag-chip {
      padding: 7px 14px;
      border-radius: 20px;
      border: 1px solid var(--border2);
      background: var(--surface2);
      color: rgba(240, 237, 232, 0.65);
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.18s;
      user-select: none;
      -webkit-user-select: none;
    }

    .tag-chip:active {
      transform: scale(0.95);
    }

    .tag-chip.selected {
      background: rgba(200, 245, 59, 0.12);
      border-color: var(--accent);
      color: var(--accent);
      font-weight: 600;
    }

    .tag-group+.tag-group {
      margin-top: 16px;
    }

    .tag-required-hint {
      font-size: 11px;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      margin-top: 6px;
    }

    .tag-required-hint.error {
      color: #ff6b6b;
    }

    .card-tag {

    }

    .tag-flux {

    .tag-vehicles {

    }

    .tag-products {

    /* â”€â”€ VIEW MODAL â”€â”€ */
    .view-modal {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: var(--modal-radius);

      max-width: 860px;
      max-height: 90dvh;

      transform: translateY(30px) scale(0.97);
      transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);

      scrollbar-color: var(--border2) transparent;
      -webkit-overflow-scrolling: touch;

    .view-modal-date {

    }

    .view-modal-actions {

    .btn-edit {
      background: var(--surface2);
      border: 1px solid var(--border2);
      color: var(--text);
      padding: 8px 14px;
      border-radius: 8px;
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
      min-height: 38px;
    }

    .btn-edit:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .btn-edit:active {

    <!--  PWA BOOTSTRAP  -->
  <script>
    (function () {
      'use strict';

      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').catch(e => console.warn('SW failed:', e));
      }

      let deferredPrompt = null;
      window.addEventListener('beforeinstallprompt', e => {
        e.preventDefault(); deferredPrompt = e;
        setTimeout(() => { if (deferredPrompt && !window.matchMedia('(display-mode: standalone)').matches) showInstallBanner(); }, 3000);
      });
      window.addEventListener('appinstalled', () => { deferredPrompt = null; hideInstallBanner(); });

      function showInstallBanner() {
        if (document.getElementById('pwa-install-banner')) return;
        const banner = document.createElement('div');
        banner.id = 'pwa-install-banner';
        banner.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);z-index:9999;background:#111118;border:1px solid rgba(200,245,59,0.3);border-radius:14px;padding:14px 18px;display:flex;align-items:center;gap:14px;box-shadow:0 8px 40px rgba(0,0,0,0.5);font-family:Syne,sans-serif;max-width:calc(100vw - 32px);';
        banner.innerHTML = '<div style="width:36px;height:36px;background:#c8f53b;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;"><img src="logo_black.png" style="width:22px;height:22px;object-fit:contain;"></div><div style="flex:1;min-width:0;"><div style="font-size:13px;font-weight:700;color:#f0ede8;">Install Prompt-Vault</div><div style="font-size:11px;color:#7a7a8a;margin-top:2px;">Add to your home screen</div></div><button id="pwa-install-btn" style="background:#c8f53b;color:#0a0a0f;border:none;padding:8px 14px;border-radius:8px;font-weight:700;cursor:pointer;flex-shrink:0;">Install</button><button id="pwa-dismiss-btn" style="background:none;border:none;color:#7a7a8a;cursor:pointer;padding:4px;font-size:18px;">✕</button>';
        document.body.appendChild(banner);
        document.getElementById('pwa-install-btn').onclick = async () => { if (!deferredPrompt) return; deferredPrompt.prompt(); await deferredPrompt.userChoice; deferredPrompt = null; hideInstallBanner(); };
        document.getElementById('pwa-dismiss-btn').onclick = hideInstallBanner;
      }
      function hideInstallBanner() { const b = document.getElementById('pwa-install-banner'); if (b) b.remove(); }
    })();
  </script>
